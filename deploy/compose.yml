# feishu-agent 内网部署（.51 = ubantu2，overlay <deploy-host-wg> / LAN <deploy-host>）。
# 单容器：飞书机器人长连接(只出站) + 管理后台(:8800)。SQLite 数据持久化在 ./data。
# 镜像来自自建 Harbor(<harbor-host>)；真实密钥走挂载的 config.yaml（不入库、不进镜像）。
name: feishu-agent

services:
  feishu-agent:
    image: ${REGISTRY:?}/${PROJECT:?}/feishu-agent:${TAG:-latest}
    container_name: feishu-agent
    restart: unless-stopped
    volumes:
      # 飞书凭证 + 初始管理员密码（仅放在 .51，不入库、不进镜像）
      - ./config.yaml:/code/config.yaml:ro
      # 设置/记忆/用量(SQLite) —— 持久化，部署/回滚都不要动它
      - ./data:/code/data
      # 时区：用宿主机时区（Asia/Shanghai），否则容器默认 UTC 会让定时任务差 8 小时
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    ports:
      # 全网卡：公司 LAN 直接 http://<deploy-host>:8800 进后台；
      # 飞书是出站长连接，无需任何入站端口
      - "8800:8800"
    # 健康检查继承自镜像 HEALTHCHECK(/healthz)；deploy.sh 据此判健康门
