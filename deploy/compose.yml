# feishu-agent 内网部署（.51 = ubantu2，overlay 10.10.0.3 / LAN 192.168.110.51）。
# 单容器：飞书机器人长连接(只出站) + 管理后台(:8800)。SQLite 数据持久化在 ./data。
# 镜像来自自建 Harbor(10.10.0.1)；真实密钥走挂载的 config.yaml（不入库、不进镜像）。
name: feishu-agent

services:
  feishu-agent:
    image: ${REGISTRY:?}/${PROJECT:?}/feishu-agent:${TAG:-latest}
    container_name: feishu-agent
    restart: unless-stopped
    volumes:
      # 飞书凭证 + 初始管理员密码（仅放在 .51，不入库、不进镜像）
      - ./config.yaml:/code/config.yaml:ro
      # 设置/记忆/用量(SQLite) —— 持久化，部署/回滚都不要动它
      - ./data:/code/data
    ports:
      # 全网卡：公司 LAN 直接 http://192.168.110.51:8800 进后台；
      # 飞书是出站长连接，无需任何入站端口
      - "8800:8800"
    # 健康检查继承自镜像 HEALTHCHECK(/healthz)；deploy.sh 据此判健康门
