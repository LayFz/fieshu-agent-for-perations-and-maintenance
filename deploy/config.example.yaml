# 复制为 .51 部署目录(/opt/feishu-agent/)下的 config.yaml（仅本机，不入库、不进镜像）。
# feishu-agent 大部分配置(模型/提示词/飞书凭证)都能在管理后台改、存 SQLite(data/)；
# 这里只放"冷启动必需"的：飞书凭证(bot 连长连接用) + 初始管理员密码。
feishu:
  app_id: cli_aa9f8123c47a9cd8
  app_secret: ""              # 飞书自建应用 App Secret（必填）
llm:
  base_url: ""                # 可留空，登录后台「大模型配置」再填
  model: ""
  api_key: ""
admin:
  username: admin
  password: ""                # 初始管理员强密码（首启建号用，登录后可在「账号」改）
web:
  port: 8800
  session_secret: ""          # 固定一串随机值，重启不掉登录态：openssl rand -hex 32
